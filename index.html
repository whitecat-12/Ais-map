<!DOCTYPE html> 
<html>
<head>
  <title>AIS Tracking CSV</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    #control { padding: 10px; background: #f4f4f4; }
    #map { height: 90vh; }
  </style>
</head>
<body>

<div id="control">
  <input type="file" id="fileInput" accept=".csv">
  <span>Upload CSV AIS</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([-2, 118], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    let text = event.target.result;

    let delimiter = text.includes(";") ? ";" : ",";

    let rows = text.split("\n").filter(r => r.trim() !== "");
    let headers = rows[0].toLowerCase().split(delimiter).map(h => h.trim());

    const latIndex = headers.findIndex(h => h.includes("lat"));
    const lonIndex = headers.findIndex(h => h.includes("lon"));
    const mmsiIndex = headers.findIndex(h => h.includes("mmsi"));

    if (latIndex === -1 || lonIndex === -1) {
      alert("Kolom LAT/LON tidak ditemukan!");
      return;
    }

    let data = [];

    for (let i = 1; i < rows.length; i++) {
      let cols = rows[i].split(delimiter);

      let lat = parseFloat((cols[latIndex] || "").replace(/"/g, ""));
      let lon = parseFloat((cols[lonIndex] || "").replace(/"/g, ""));
      let mmsi = cols[mmsiIndex] || "unknown";

      if (!isNaN(lat) && !isNaN(lon)) {
        data.push({ lat, lon, mmsi, index: i });
      }
    }

    if (data.length === 0) {
      alert("Data tidak terbaca!");
      return;
    }

    tampilkanTracking(data);
  };

  reader.readAsText(file);
});

function tampilkanTracking(data) {
  const grouped = {};
  data.forEach(d => {
    if (!grouped[d.mmsi]) grouped[d.mmsi] = [];
    grouped[d.mmsi].push(d);
  });

  let bounds = [];

  for (let mmsi in grouped) {
    let kapal = grouped[mmsi];

    // urutkan data
    kapal.sort((a, b) => a.index - b.index);

    // sampling biar ringan
    let filtered = kapal.filter((_, i) => i % 5 === 0);

    for (let i = 0; i < filtered.length; i++) {
      let d = filtered[i];

      // 🔴 titik merah semua
      L.circleMarker([d.lat, d.lon], {
        radius: 3,
        color: "red",
        fillColor: "red",
        fillOpacity: 0.6
      }).addTo(map);

      bounds.push([d.lat, d.lon]);
    }

    // 🔴 titik terakhir (lebih besar)
    let last = filtered[filtered.length - 1];
    L.circleMarker([last.lat, last.lon], {
      radius: 6,
      color: "red",
      fillColor: "red",
      fillOpacity: 1
    }).addTo(map).bindPopup("MMSI: " + mmsi);
  }

  if (bounds.length > 0) {
    map.fitBounds(bounds);
  }
}
</script>

</body>
</html>
