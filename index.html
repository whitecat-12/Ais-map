<!DOCTYPE html>
<html>
<head>
    <title>AIS Maritime Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // ✅ API KEY (SUDAH BENAR)
    const API_KEY = "460b2729299f645e2c7d192d42117ec8d9eeb9fd";

    // ✅ INIT MAP (langsung ke area ramai biar kelihatan hasilnya)
    const map = L.map('map').setView([1.2, 103.8], 8); // Singapura

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const ships = {};

    // ✅ CONNECT WEBSOCKET
    const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

    socket.onopen = () => {
        console.log("✅ Connected to AISStream");

        // ✅ FIX: tidak ada const di dalam object
        socket.send(JSON.stringify({
            APIKey: API_KEY,
            BoundingBoxes: [[[ 1.0, 103.5 ], [ 1.5, 104.0 ]]] // area padat kapal
        }));
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.Message && data.Message.PositionReport) {
            const report = data.Message.PositionReport;
            const meta = data.MetaData;

            const lat = report.Latitude;
            const lon = report.Longitude;
            const mmsi = meta.MMSI;

            // update atau buat marker
            if (ships[mmsi]) {
                ships[mmsi].setLatLng([lat, lon]);
            } else {
                const marker = L.marker([lat, lon])
                    .addTo(map)
                    .bindPopup(`🚢 MMSI: ${mmsi}`);

                ships[mmsi] = marker;
            }
        }
    };

    socket.onerror = (err) => {
        console.error("❌ Error:", err);
    };

    socket.onclose = () => {
        console.log("🔌 Disconnected");
    };
</script>

</body>
</html>
