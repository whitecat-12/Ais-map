<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Kapal Realtime - Indonesia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        #map { height: 70vh; width: 100%; background: #1a1a1a; }
        #info-panel { height: 30vh; padding: 15px; overflow-y: auto; background: #1e293b; border-top: 3px solid #334155; box-sizing: border-box; }
        .status-tag { position: absolute; top: 15px; right: 15px; z-index: 1000; padding: 8px 16px; border-radius: 8px; background: rgba(15, 23, 42, 0.9); border: 1px solid #334155; font-weight: bold; }
        .log-entry { font-family: monospace; font-size: 11px; border-bottom: 1px solid #334155; padding: 4px 0; color: #94a3b8; }
        .ship-name { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status-tag" id="status">⏳ Inisialisasi...</div>
    <div id="map"></div>
    <div id="info-panel">
        <strong style="color: #f8fafc;">🛰️ Live AIS Stream (Selat Malaka & Sekitarnya)</strong>
        <div id="log-content">Menghubungkan ke server...</div>
    </div>

    <script>
        const API_KEY = "460b2729299f645e2c7d192d42117ec8d9eeb9fd";
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log-content');

        // Fokus ke Selat Malaka (Area paling aktif)
        const map = L.map('map').setView([1.3521, 103.8198], 8);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const shipMarkers = {};

        function connectAIS() {
            const socket = new WebSocket("wss://api.aisstream.io/v0/stream");

            socket.onopen = function() {
                statusEl.innerText = "🟢 Terhubung";
                statusEl.style.color = "#4ade80";
                
                const subscription = {
                    APIKey: API_KEY,
                    // Area: Selat Malaka sampai Singapura (Lebih stabil untuk Free Tier)
                    BoundingBoxes: [[[0.0, 100.0], [5.0, 105.0]]], 
                    FiltersShipType: [] 
                };
                socket.send(JSON.stringify(subscription));
            };

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // Cek apakah data valid
                if (!data.MetaData || !data.MetaData.MMSI) return;

                const mmsi = data.MetaData.MMSI;
                const shipName = data.MetaData.ShipName.trim() || `MMSI: ${mmsi}`;
                const lat = data.MetaData.Latitude;
                const lon = data.MetaData.Longitude;
                const speed = data.Message.PositionReport?.Sog || 0;

                const markerColor = speed > 1 ? "#22c55e" : "#ef4444";

                if (shipMarkers[mmsi]) {
                    shipMarkers[mmsi].setLatLng([lat, lon]);
                    shipMarkers[mmsi].setStyle({ fillColor: markerColor });
                } else {
                    shipMarkers[mmsi] = L.circleMarker([lat, lon], {
                        radius: 5,
                        fillColor: markerColor,
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.9
                    }).addTo(map);
                    
                    shipMarkers[mmsi].bindPopup(`<b>${shipName}</b><br>Speed: ${speed} knots`);
                }

                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `[${new Date().toLocaleTimeString()}] <span class="ship-name">${shipName}</span> bergerak di ${lat.toFixed(3)}, ${lon.toFixed(3)}`;
                logEl.prepend(entry);
                if(logEl.childNodes.length > 20) logEl.removeChild(logEl.lastChild);
            };

            socket.onclose = function(e) {
                statusEl.innerText = "🔴 Terputus. Mencoba lagi...";
                statusEl.style.color = "#f87171";
                // Reconnect setelah 5 detik
                setTimeout(connectAIS, 5000);
            };

            socket.onerror = function(err) {
                console.error("Socket Error:", err);
                socket.close();
            };
        }

        // Jalankan koneksi
        connectAIS();
    </script>
</body>
</html>
