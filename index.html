          [-7.0835, 112.6622], [-7.0932, 112.6619], [-7.0998, 112.6622],
          [-7.1066, 112.6634], [-7.1125, 112.6632], [-7.1175, 112.6620],
          [-7.1209, 112.6607], [-7.1227, 112.6593], [-7.1253, 112.6579],
          [-7.1275, 112.6568], [-7.1291, 112.6560], [-7.1306, 112.6554],
          [-7.1317, 112.6551], [-7.1322, 112.6551], [-7.1337, 112.6555]
        ]
      }
    ];
  }
  
  // Smooth line function
  function smoothLine(points, resolution = 20) {
    const smooth = [];
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[i];
      const p1 = points[i+1];
      for (let t = 0; t <= resolution; t++) {
        const ratio = t / resolution;
        const lat = p0[0] + (p1[0] - p0[0]) * ratio;
        const lng = p0[1] + (p1[1] - p0[1]) * ratio;
        smooth.push([lat, lng]);
      }
    }
    smooth.push(points[points.length-1]);
    return smooth;
  }
  
  // Update vessel data card
  function updateVesselCardWithData(vessel) {
    document.getElementById('displayMMSI').innerText = vessel.mmsi || '-';
    document.getElementById('displayName').innerHTML = `<i class="fas fa-ship"></i> ${vessel.name || '-'}`;
    document.getElementById('displayLength').innerText = vessel.length ? `${vessel.length} m` : '-';
    document.getElementById('displayDraft').innerText = vessel.draft ? `${vessel.draft} m` : 'Tidak tersedia';
    document.getElementById('displayType').innerText = vessel.type || '-';
    document.getElementById('displayCargo').innerText = vessel.cargo ? vessel.cargo.replace(/_/g, ' ') : '-';
    document.getElementById('displayLastBerthing').innerHTML = `<i class="far fa-calendar-alt"></i> Last Berthing: ${vessel.last_berthing || '-'} | Visit: ${vessel.visit_count || 0}x`;
  }
  
  // Update ship popup
  function updateShipPopup(vessel) {
    const newPopupContent = `
      <div style="font-family: 'Courier New', monospace; min-width: 260px;">
        <b style="color:#6bc2e8;">🛳️ VESSEL AIS DETAIL</b>
        <hr style="margin:6px 0; border-color:#2c7da0;">
        <table style="width:100%; font-size:12px; color:#eef4ff;">
           <tr><td style="font-weight:bold;">Nama Kapal:</td><td style="text-align:right;">${vessel.name}</td></tr>
           <tr><td style="font-weight:bold;">MMSI:</td><td style="text-align:right;">${vessel.mmsi}</td></tr>
           <tr><td style="font-weight:bold;">Panjang:</td><td style="text-align:right;">${vessel.length} m</td></tr>
           <tr><td style="font-weight:bold;">Draft:</td><td style="text-align:right;">${vessel.draft ? vessel.draft + ' m' : 'N/A'}</td></tr>
           <tr><td style="font-weight:bold;">Tipe:</td><td style="text-align:right;">${vessel.type}</td></tr>
           <tr><td style="font-weight:bold;">Kargo:</td><td style="text-align:right;">${vessel.cargo ? vessel.cargo.replace(/_/g, ' ') : '-'}</td></tr>
           <tr><td style="font-weight:bold;">Last Berthing:</td><td style="text-align:right;">${vessel.last_berthing || '-'}</td></tr>
           <tr><td style="font-weight:bold;">Visit Count:</td><td style="text-align:right;">${vessel.visit_count || 0}x</td></tr>
         </table>
      </div>
    `;
    if (ship) {
      ship.unbindPopup();
      ship.bindPopup(newPopupContent);
    }
  }
  
  // Update route on map for selected vessel
  function updateRouteForVessel(vessel) {
    if (!vessel || !vessel.route || vessel.route.length === 0) {
      showToastMsg("⚠️ Kapal ini tidak memiliki data rute");
      return;
    }
    
    currentRoutePoints = vessel.route;
    
    // Remove existing polyline
    if (currentPolyline) {
      map.removeLayer(currentPolyline);
    }
    
    // Clear existing route points markers
    map.eachLayer((layer) => {
      if (layer.options && layer.options.radius === 3.5 && layer.options.color === "#ff4444") {
        map.removeLayer(layer);
      }
    });
    
    // Add new route points
    currentRoutePoints.forEach(p => {
      L.circleMarker(p, { radius: 3.5, color: "#ff4444", fillColor: "#ff6666", fillOpacity: 0.85, weight: 1.5 }).addTo(map);
    });
    
    // Create smooth polyline
    currentSmoothCoords = smoothLine(currentRoutePoints, 25);
    currentPolyline = L.polyline(currentSmoothCoords, { 
      color: "#0f6b8c", 
      weight: 4, 
      opacity: 0.95,
      smoothFactor: 0.8,
      lineCap: 'round',
      lineJoin: 'round'
    }).addTo(map);
    
    currentPolyline.bindTooltip(`${vessel.name} • ${vessel.type}`, { sticky: true });
    
    // Add end point marker
    const endPoint = currentRoutePoints[currentRoutePoints.length - 1];
    L.circleMarker(endPoint, { 
      radius: 8, 
      color: "#c0392b", 
      fillColor: "#e74c3c", 
      fillOpacity: 1, 
      weight: 2 
    }).addTo(map);
    
    // Restart ship animation
    if (shipAnimationInterval) {
      clearInterval(shipAnimationInterval);
    }
    
    // Move ship to start of new route
    ship.setLatLng(currentSmoothCoords[0]);
    
    // Animate ship
    let shipIdx = 0;
    function animateShip() {
      if (shipIdx >= currentSmoothCoords.length) shipIdx = 0;
      ship.setLatLng(currentSmoothCoords[shipIdx]);
      shipIdx++;
    }
    shipAnimationInterval = setInterval(animateShip, 50);
    
    // Update tooltip
    ship.setTooltipContent(`⛴️ ${vessel.name}`);
    
    // Fit map to new route bounds
    map.fitBounds(currentRoutePoints);
  }
  
  // Initialize map and route
  function initMap() {
    map = L.map('map', { renderer: L.canvas(), preferCanvas: true, attributionControl: false }).setView([-6.5, 112.5], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      detectRetina: true,
      attribution: ''
    }).addTo(map);
    
    // Add ship icon
    const shipIcon = L.divIcon({ 
      html: '<div style="font-size:32px; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));">⛴️</div>', 
      className: "", 
      iconSize: [36, 36], 
      popupAnchor: [0, -18] 
    });
    
    ship = L.marker([0, 0], { icon: shipIcon }).addTo(map);
    
    // Add docks
    addDocks();
    
    // Add legend
    addLegend();
    
    // Set default vessel if available
    if (vesselsDatabase.length > 0) {
      currentVessel = vesselsDatabase[0];
      updateVesselCardWithData(currentVessel);
      updateShipPopup(currentVessel);
      updateRouteForVessel(currentVessel);
    }
  }
  
  // Add dock polygons
  function addDocks() {
    const dock1Points = [[-7.1321, 112.6548], [-7.1342, 112.6554], [-7.1340, 112.6561], [-7.1319, 112.6555]];
    const dock2Points = [[-7.1325, 112.6538], [-7.1323, 112.6545], [-7.1343, 112.6550], [-7.1345, 112.6543]];
    
    function addDock(points, dockName, centerLatLng, colorHex = "#1f9e6d") {
      L.polygon(points, { color: colorHex, weight: 3, fillColor: colorHex, fillOpacity: 0.35 }).addTo(map);
      const dockMarker = L.marker(centerLatLng, {
        icon: L.divIcon({ html: '<div style="font-size: 26px;">⚓</div>', iconSize: [30, 30], className: 'dock-marker-icon' })
      }).addTo(map);
      dockMarker.bindPopup(`<b>${dockName}</b><br>📍 Area bongkar muat aktif`);
    }
    
    function getPolygonCenter(points) {
      let sumLat = 0, sumLng = 0;
      points.forEach(p => { sumLat += p[0]; sumLng += p[1]; });
      return [sumLat / points.length, sumLng / points.length];
    }
    
    addDock(dock1Points, "DOCK 1 • Sea Route Hub", getPolygonCenter(dock1Points), "#2c9b77");
    addDock(dock2Points, "DOCK 2 • Cargo Premier", getPolygonCenter(dock2Points), "#2c7da0");
    
    L.polyline([getPolygonCenter(dock1Points), getPolygonCenter(dock2Points)], {
      color: "#ffaa55", weight: 1.5, opacity: 0.6, dashArray: "5, 8"
    }).addTo(map);
  }
  
  // Add legend
  function addLegend() {
    const dockLegend = L.control({ position: 'bottomright' });
    dockLegend.onAdd = () => {
      const div = L.DomUtil.create('div', 'info legend');
      div.style.backgroundColor = 'rgba(8, 22, 33, 0.85)';
      div.style.color = '#eef4ff';
      div.style.padding = '6px 12px';
      div.style.borderRadius = '24px';
      div.style.fontSize = '10px';
      div.style.backdropFilter = 'blur(4px)';
      div.innerHTML = '<i class="fas fa-anchor"></i> DOCK 1 & DOCK 2 | <i class="fas fa-search"></i> Cari Kapal';
      return div;
    };
    dockLegend.addTo(map);
  }
  
  // Search functionality
  function searchVessels(query) {
    if (!query.trim()) return [];
    const lowerQuery = query.toLowerCase();
    return vesselsDatabase.filter(vessel => {
      const nameMatch = vessel.name.toLowerCase().includes(lowerQuery);
      const lengthMatch = vessel.length && vessel.length.toString().includes(lowerQuery);
      const draftMatch = vessel.draft && vessel.draft.toString().includes(lowerQuery);
      return nameMatch || lengthMatch || draftMatch;
    });
  }
  
  function renderResults(results) {
    const searchResults = document.getElementById('searchResults');
    if (results.length === 0) {
      searchResults.innerHTML = '<div class="no-result"><i class="fas fa-ship"></i> Kapal tidak ditemukan</div>';
      searchResults.classList.add('show');
      return;
    }
    
    searchResults.innerHTML = results.map(vessel => `
      <div class="result-item" data-mmsi="${vessel.mmsi}">
        <div class="result-name">
          <i class="fas fa-ship"></i> ${vessel.name}
        </div>
        <div class="result-details">
          <span><i class="fas fa-ruler"></i> ${vessel.length}m</span>
          <span><i class="fas fa-water"></i> Draft: ${vessel.draft ? vessel.draft + 'm' : 'N/A'}</span>
          <span><i class="fas fa-box"></i> ${vessel.type}</span>
        </div>
      </div>
    `).join('');
    
    searchResults.classList.add('show');
    
    document.querySelectorAll('.result-item').forEach(item => {
      item.addEventListener('click', () => {
        const mmsi = parseInt(item.dataset.mmsi);
        const vessel = vesselsDatabase.find(v => v.mmsi === mmsi);
        if (vessel) {
          currentVessel = vessel;
          updateVesselCardWithData(vessel);
          updateShipPopup(vessel);
          updateRouteForVessel(vessel);
          showVesselDetailToast(vessel);
          document.getElementById('searchInput').value = '';
          searchResults.classList.remove('show');
          document.getElementById('searchClear').style.display = 'none';
        }
      });
    });
  }
  
  function showVesselDetailToast(vessel) {
    const toast = document.createElement('div');
    toast.className = 'export-toast';
    toast.style.bottom = '120px';
    toast.style.background = '#0a1a24';
    toast.style.borderLeft = '3px solid #3b9bcb';
    toast.style.whiteSpace = 'normal';
    toast.style.maxWidth = '300px';
    toast.style.textAlign = 'center';
    toast.innerHTML = `
      <i class="fas fa-ship"></i> <strong>${vessel.name}</strong><br>
      📏 Panjang: ${vessel.length} m | 📊 Draft: ${vessel.draft ? vessel.draft + ' m' : 'N/A'}<br>
      🏗️ Tipe: ${vessel.type} | 🚢 MMSI: ${vessel.mmsi}
    `;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
  
  function showToastMsg(msg, duration = 2000) {
    const toast = document.createElement('div');
    toast.className = 'export-toast';
    toast.innerHTML = `<i class="fas fa-download"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => { 
      toast.style.opacity = '0'; 
      setTimeout(() => toast.remove(), 300); 
    }, duration);
  }
  
  // Export functions
  async function captureMapOnly() {
    const container = document.getElementById('exportContainer');
    const canvas = await html2canvas(container, { scale: 4.0, useCORS: true, logging: false, backgroundColor: '#eef5fa' });
    return canvas;
  }
  
  // Initialize everything
  async function initializeApp() {
    await loadExternalData();
    initMap();
    
    // Setup search event listeners
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const searchContainer = document.querySelector('.search-container');
    
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value;
      if (query.trim()) {
        searchClear.style.display = 'block';
        const results = searchVessels(query);
        renderResults(results);
      } else {
        searchClear.style.display = 'none';
        document.getElementById('searchResults').classList.remove('show');
      }
    });
    
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.style.display = 'none';
      document.getElementById('searchResults').classList.remove('show');
      searchInput.focus();
    });
    
    document.addEventListener('click', (e) => {
      if (!searchContainer.contains(e.target)) {
        document.getElementById('searchResults').classList.remove('show');
      }
    });
    
    // Navbar toggle
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    
    menuToggle.addEventListener('click', () => {
      navMenu.classList.toggle('active');
      const icon = menuToggle.querySelector('i');
      icon.classList.toggle('fa-bars');
      icon.classList.toggle('fa-times');
    });
    
    document.querySelectorAll('.nav-menu a').forEach(link => {
      link.addEventListener('click', (e) => {
        if (window.innerWidth <= 768) {
          navMenu.classList.remove('active');
          menuToggle.querySelector('i').classList.add('fa-bars');
          menuToggle.querySelector('i').classList.remove('fa-times');
        }
        if (link.id === 'homeLink') { e.preventDefault(); map.setView([-6.5, 112.5], 9); }
        else if (link.id === 'trackLink') { e.preventDefault(); if (currentRoutePoints.length) map.fitBounds(currentRoutePoints); }
        else if (link.id === 'portsLink') { e.preventDefault(); map.setView([-7.13, 112.655], 15); }
      });
    });
    
    // Export buttons in navbar
    document.getElementById('exportPngNav').addEventListener('click', async () => {
      showToastMsg("Memproses gambar presisi tinggi...");
      try {
        const canvas = await captureMapOnly();
        const link = document.createElement('a');
        link.download = 'sea_route_precision.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToastMsg("✅ PNG berhasil diunduh");
      } catch (err) { showToastMsg("❌ Gagal ekspor PNG"); }
    });
    
    document.getElementById('exportPdfNav').addEventListener('click', async () => {
      showToastMsg("Menyusun PDF presisi tinggi...");
      try {
        const canvas = await captureMapOnly();
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4', compress: false });
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        const imgWidth = pdfWidth;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        let heightLeft = imgHeight, position = 0;
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
        heightLeft -= pdfHeight;
        while (heightLeft > 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
          heightLeft -= pdfHeight;
        }
        pdf.save('sea_route_precision_report.pdf');
        showToastMsg("📄 PDF sukses diunduh!");
      } catch (e) { showToastMsg("⚠️ Ekspor PDF gagal"); }
    });
    
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768 && navMenu.classList.contains('active')) {
        navMenu.classList.remove('active');
        menuToggle.querySelector('i').classList.add('fa-bars');
        menuToggle.querySelector('i').classList.remove('fa-times');
      }
      setTimeout(() => map.invalidateSize(), 150);
    });
    
    setTimeout(() => { if (ship) ship.openPopup(); setTimeout(() => map.closePopup(), 4500); }, 1300);
  }
  
  // Start the application
  initializeApp();
</script>
